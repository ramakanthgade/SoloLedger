name: CI

on:
  pull_request:
    paths:
      - 'sololedger_claude_V3/**'
      - '.github/workflows/ci.yml'
  push:
    branches:
      - main
    paths:
      - 'sololedger_claude_V3/**'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  client:
    name: Client (typecheck, lint, test, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sololedger_claude_V3
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: sololedger_claude_V3/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  server:
    name: Server (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sololedger_claude_V3/server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: sololedger_claude_V3/server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
