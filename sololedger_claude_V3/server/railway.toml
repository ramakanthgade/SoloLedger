# SoloLedger API — Railway config (Root Directory must be sololedger_claude_V3/server)
# Docs: https://docs.railway.com/reference/config-as-code

[build]
builder = "NIXPACKS"
buildCommand = "npm run build"
# Only redeploy when API files change (frontend pushes won't restart this service)
watchPatterns = ["**"]

[deploy]
startCommand = "npm start"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
