# SoloLedger API — Railway config (Root Directory must be sololedger_claude_V3/server)
# Docs: https://docs.railway.com/reference/config-as-code

[build]
builder = "NIXPACKS"
buildCommand = "npm run build"
# Only redeploy when API/server files change so frontend-only pushes don't restart
# this service. watchPatterns are evaluated relative to the REPO ROOT (not the
# service Root Directory), so the path must include the full monorepo prefix.
watchPatterns = ["sololedger_claude_V3/server/**"]

[deploy]
startCommand = "npm start"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
